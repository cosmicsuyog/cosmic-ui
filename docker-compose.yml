services:
  server:
    build:
      context: ./server
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      CLIENT_URL: http://localhost:8080
    ports:
      - "3000:3000"
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: /api
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    depends_on:
      - server
    ports:
      - "8080:80"
    restart: unless-stopped
